# Deploy to Vercel only when this workflow runs (not via Vercel Git auto-deploy).
# Required GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID,
#   PORTAL_GOOGLE_CLIENT_ID, PORTAL_GOOGLE_CLIENT_SECRET
# Optional GitHub variables: NEXT_PUBLIC_API_URL, NEXT_PUBLIC_APP_URL, API_PROXY_URL
# Seed from local .env: npm run seed-github-config
# See alocare-tech-stack/deployment/app-web.md

name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Vercel target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

concurrency:
  group: vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve deployment target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            ENV="preview"
          else
            ENV="production"
          fi
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          if [ "${ENV}" = "production" ]; then
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi
          echo "Deploying to: ${ENV}"

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PORTAL_GOOGLE_CLIENT_ID: ${{ secrets.PORTAL_GOOGLE_CLIENT_ID }}
          PORTAL_GOOGLE_CLIENT_SECRET: ${{ secrets.PORTAL_GOOGLE_CLIENT_SECRET }}
        run: |
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID PORTAL_GOOGLE_CLIENT_ID PORTAL_GOOGLE_CLIENT_SECRET; do
            val=$(printenv "$name")
            if [ -z "$val" ]; then
              echo "::error::Missing secret ${name}. Add it under Settings → Secrets and variables → Actions (npm run seed-github-config)."
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Sync Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PORTAL_GOOGLE_CLIENT_ID: ${{ secrets.PORTAL_GOOGLE_CLIENT_ID }}
          PORTAL_GOOGLE_CLIENT_SECRET: ${{ secrets.PORTAL_GOOGLE_CLIENT_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.alocare.net' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://app.alocare.net' }}
          API_PROXY_URL: ${{ vars.API_PROXY_URL || 'https://api.alocare.net' }}
        run: bash scripts/deploy/sync-vercel-env.sh ${{ steps.target.outputs.environment }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.target.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        env:
          PORTAL_GOOGLE_CLIENT_ID: ${{ secrets.PORTAL_GOOGLE_CLIENT_ID }}
          PORTAL_GOOGLE_CLIENT_SECRET: ${{ secrets.PORTAL_GOOGLE_CLIENT_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.alocare.net' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'https://app.alocare.net' }}
          API_PROXY_URL: ${{ vars.API_PROXY_URL || 'https://api.alocare.net' }}
        run: vercel build ${{ steps.target.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Deploy attempt ${attempt}/${max_attempts}..."
            if URL=$(vercel deploy --prebuilt --archive=tgz ${{ steps.target.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}); then
              echo "url=${URL}" >> "$GITHUB_OUTPUT"
              echo "Deployed: ${URL}"
              exit 0
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "::error::Vercel deploy failed after ${max_attempts} attempts."
              exit 1
            fi
            sleep $((attempt * 30))
            attempt=$((attempt + 1))
          done

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `### Vercel preview\n\nDeployed via GitHub Actions: ${url}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
